<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="/static/style.css">

</head>
<body>

<div class="auth-box">

<h1>Sign In</h1>

<form action="/login_user"
method="POST">

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button>
Login
</button>

</form>

<br>

<a href="/register">
Create Account
</a>

</div>

</body>
</html>
