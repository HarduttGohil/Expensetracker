<!DOCTYPE html>
<html>

<head>

    <title>Edit Transaction</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<h1>Edit Transaction</h1>

<form action="/update/{{ transaction[0] }}"
      method="POST">

    <input
        type="date"
        name="date"
        value="{{ transaction[2] }}"
        required>

    <select name="type">

        <option
        {% if transaction[3]=='Income' %}
        selected
        {% endif %}>
        Income
        </option>

        <option
        {% if transaction[3]=='Expense' %}
        selected
        {% endif %}>
        Expense
        </option>

    </select>

    <input
        type="text"
        name="category"
        value="{{ transaction[4] }}"
        required>

    <input
        type="number"
        step="0.01"
        name="amount"
        value="{{ transaction[5] }}"
        required>

    <input
        type="text"
        name="description"
        value="{{ transaction[6] }}">

    <button type="submit">
        Update Transaction
    </button>

</form>

<br>

<a href="/">
    Back To Dashboard
</a>

</body>
</html>
