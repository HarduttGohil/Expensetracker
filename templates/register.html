<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h1>Register</h1>

<form action="/register_user" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<br>

<a href="/login">
    Already have an account?
</a>

</body>
</html>
